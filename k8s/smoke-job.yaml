# One-shot proving Job: connect to the Chrome CDP Service, print /json/version, and
# assert the reported User-Agent does NOT advertise "Headless". Exit non-zero on fail.
#
# Carries role=chrome-controller so networkpolicy.yaml lets it reach port 9222.
apiVersion: batch/v1
kind: Job
metadata:
  name: chrome-smoke
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels: { role: chrome-controller }
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      containers:
        - name: smoke
          image: curlimages/curl:8.8.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              # Chrome's DevTools rejects DNS-name Host headers (anti DNS-rebinding),
              # so we reach the Service by name but send an accepted Host header.
              echo "waiting for chrome:9222 ..."
              for i in $(seq 1 30); do
                if curl -fsS -H "Host: localhost:9222" \
                     "http://chrome:9222/json/version" -o /tmp/v.json; then break; fi
                sleep 2
              done
              cat /tmp/v.json; echo
              ua=$(sed -n 's/.*"User-Agent": *"\([^"]*\)".*/\1/p' /tmp/v.json)
              echo "User-Agent: ${ua}"
              case "${ua}" in
                *Headless*) echo "FAIL: User-Agent leaks Headless"; exit 1 ;;
                *Chrome/*)  echo "PASS: driveable, non-Headless UA" ;;
                *)          echo "FAIL: unexpected/empty User-Agent"; exit 1 ;;
              esac

              # Anubis is up and serving its challenge. Public hostname -> valid
              # Let's Encrypt cert (no -k), routed to the in-cluster ClusterIP.
              echo "checking Anubis at anubis-ci.alrest.cetacean.club ..."
              code=$(curl -sS -o /tmp/anubis.html -H "User-Agent: Mozilla" -w '%{http_code}' \
                       https://anubis-ci.alrest.cetacean.club/ || echo 000)
              echo "Anubis HTTP ${code}"
              [ "${code}" = "200" ] || { echo "FAIL: Anubis not 200"; exit 1; }
              grep -qi anubis /tmp/anubis.html \
                && echo "PASS: Anubis is serving its challenge" \
                || { echo "FAIL: response is not Anubis"; exit 1; }
        # Controller: drives Chrome over CDP (the chrome Service, Host "localhost"
        # satisfies DevTools' DNS-rebind check) and points it at the Anubis
        # endpoint. It sets a marker header and waits for httpdebug (the Anubis
        # backend) to echo it back before screenshotting — proving the non-Headless
        # image transits the Anubis challenge AND that the header round-trips
        # through Anubis to the backend. Chrome's egress to Anubis is opened in
        # networkpolicy.yaml. Frames land on the PVC.
        - name: chrome-bully
          image: ghcr.io/techarohq/gubal/chrome-bully:latest
          imagePullPolicy: Always
          args:
            - -cdp-url=http://chrome:9222
            - -target-url=https://anubis-ci.alrest.cetacean.club
            # Send a distinctive header and require it back in the rendered page.
            # httpdebug reflects request headers as text, so the value only appears
            # if Chrome solved the challenge and the header reached the backend.
            - "-header=X-Chrome-Bully: chrome-bully-roundtrip-ok"
            - -expect-text=chrome-bully-roundtrip-ok
            # Driving Chrome through Anubis (challenge solve + redirect + backend
            # render) can exceed the 30s default; give it margin so a single slow
            # attempt doesn't rely on the Job's backoffLimit retry.
            - -capture-timeout=90s
            - -out-dir=/data
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 997
            runAsGroup: 993
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
          volumeMounts:
            - { name: bully-data, mountPath: /data }
      volumes:
        - name: bully-data
          persistentVolumeClaim:
            claimName: chrome-bully-data
