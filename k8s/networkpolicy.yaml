# CDP on port 9222 is unauthenticated *full control* of the browser. Lock it down so
# only the controller pod can reach it, and so Chrome can't phone home from the pod.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chrome-lockdown
spec:
  podSelector:
    matchLabels: { app: chrome }
  policyTypes: ["Ingress", "Egress"]
  ingress:
    # Only pods labelled role=chrome-controller may open a CDP connection.
    - from:
        - podSelector:
            matchLabels: { role: chrome-controller }
      ports:
        - { protocol: TCP, port: 9222 }
  egress:
    # DNS to anywhere, so Chrome can resolve test targets (incl. Anubis's hostname).
    - to: []
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    # Let Chrome reach Anubis (same namespace) so a controller can drive Chrome
    # through the challenge. 8443 is the relayd container port the Service's :443
    # DNATs to; 443 covers CNIs that enforce egress before DNAT.
    - to:
        - podSelector:
            matchLabels: { app: anubis }
      ports:
        - { protocol: TCP, port: 8443 }
        - { protocol: TCP, port: 443 }
