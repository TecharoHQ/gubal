# One-shot proving Job for Firefox: connect to the foxbridge CDP Service, print
# /json/version, assert the bridge is up, then drive Firefox through Anubis with
# chrome-bully. Mirror of k8s/smoke-job.yaml.
#
# The browser here is Firefox fronted by foxbridge, which speaks CDP on :9222.
# foxbridge advertises a hardcoded loopback webSocketDebuggerUrl
# (ws://127.0.0.1:19222/devtools/browser/foxbridge — its internal socat-backed
# port), and chromedp uses an advertised /devtools/browser/ URL verbatim. So we
# point chrome-bully straight at the browser endpoint by its stable "foxbridge"
# session id; chromedp then resolves the Service DNS to an IP and connects on
# :9222 (socat -> foxbridge) instead of dialing its own loopback.
#
# Carries role=chrome-controller so the firefox NetworkPolicy lets it reach 9222.
apiVersion: batch/v1
kind: Job
metadata:
  name: firefox-smoke
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels: { role: chrome-controller }
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      containers:
        - name: smoke
          image: curlimages/curl:8.8.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              # foxbridge serves the CDP /json/version endpoint on :9222.
              echo "waiting for firefox:9222 ..."
              for i in $(seq 1 30); do
                if curl -fsS "http://firefox:9222/json/version" -o /tmp/v.json; then break; fi
                sleep 2
              done

              cat /tmp/v.json; echo

              # Anubis is up and serving its challenge.
              echo "checking Anubis at anubis-ci.alrest.cetacean.club ..."
              code=$(curl -sS -o /tmp/anubis.html -H "User-Agent: Mozilla" -w '%{http_code}' \
                       https://anubis-ci.alrest.cetacean.club/ || echo 000)
              echo "Anubis HTTP ${code}"
              [ "${code}" = "200" ] || { echo "FAIL: Anubis not 200"; exit 1; }
              grep -qi anubis /tmp/anubis.html \
                && echo "PASS: Anubis is serving its challenge" \
                || { echo "FAIL: response is not Anubis"; exit 1; }
        # Controller: drives Firefox (via foxbridge) over CDP through Anubis, sets a
        # marker header, waits for it to echo back, then screenshots. Frames land on
        # the shared PVC. -cdp-url points at foxbridge's browser endpoint directly
        # (stable "foxbridge" session id) so chromedp resolves firefox-<tag> to an IP
        # and connects on :9222 rather than dialing foxbridge's advertised loopback.
        - name: chrome-bully
          image: ghcr.io/techarohq/gubal/chrome-bully:latest
          imagePullPolicy: Always
          args:
            - -cdp-url=ws://firefox:9222/devtools/browser/foxbridge
            - -target-url=https://anubis-ci.alrest.cetacean.club
            - "-header=X-Firefox-Bully: firefox-bully-roundtrip-ok"
            - -expect-text=firefox-bully-roundtrip-ok
            - -capture-timeout=90s
            - -out-dir=/data
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 997
            runAsGroup: 993
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
          volumeMounts:
            - { name: bully-data, mountPath: /data }
      volumes:
        - name: bully-data
          persistentVolumeClaim:
            claimName: chrome-bully-data
