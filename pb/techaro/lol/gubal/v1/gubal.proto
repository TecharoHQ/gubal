syntax = "proto3";
package techaro.lol.gubal.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

service SmokeTestService {
  rpc SmokeTest(SmokeTestRequest) returns (SmokeTestResult) {}
  rpc SubmitSmokeTest(SubmitSmokeTestRequest) returns (SubmitSmokeTestResponse) {}
}

message SmokeTestRequest {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];
  string anubis_image = 2 [(buf.validate.field).required = true];
  repeated int32 chrome_versions = 3 [
    (buf.validate.field).repeated.min_items = 1,
    (buf.validate.field).repeated.items.int32.gt = 70
  ];
  repeated int32 firefox_versions = 4 [
    (buf.validate.field).repeated.min_items = 1,
    (buf.validate.field).repeated.items.int32.gt = 101
  ];
}

message SmokeTestResult {
  bool success = 1;
  string report = 2;
  repeated ChromeVersionResult results = 3;
}

// ChromeVersionResult mirrors chromesweep.Result: the outcome of testing one
// browser image tag. The captured screenshot is not carried here — frames are
// uploaded to object storage separately.
message ChromeVersionResult {
  string tag = 1;
  SweepStatus status = 2;
  string browser_version = 3;
  string reported_ua = 4;
  string detail = 5;
  string browser = 6; // "chrome" / "firefox"
  string policy = 7;  // Anubis ruleset this result was tested against ("" if none)
}

// SubmitSmokeTestRequest is the async counterpart of SmokeTestRequest: the same
// sweep parameters plus the GitHub PR thread gubald posts results to.
message SubmitSmokeTestRequest {
  SmokeTestRequest test = 1 [(buf.validate.field).required = true];
  GitHubTarget github = 2 [(buf.validate.field).required = true];
}

// GitHubTarget names the PR thread to comment on.
message GitHubTarget {
  // "owner/repo" — matches the GITHUB_REPO env var and gubald's allowlist format.
  string repo = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^[^/]+/[^/]+$"
  ];
  int32 pr_number = 2 [(buf.validate.field).int32.gt = 0];
  string commit_sha = 3; // optional, shown in the ack/report for traceability
}

message SubmitSmokeTestResponse {
  string id = 1;      // echoes test.id
  bool accepted = 2;  // true; a busy server returns a ResourceExhausted error instead
}

enum SweepStatus {
  SWEEP_STATUS_UNSPECIFIED = 0;
  SWEEP_STATUS_PASS = 1;
  SWEEP_STATUS_FAIL = 2;
  SWEEP_STATUS_NOT_READY = 3;
  SWEEP_STATUS_ERROR = 4;
}
