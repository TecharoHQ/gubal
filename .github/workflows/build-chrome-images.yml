name: build-chrome-images

# Mass-build the Chrome era images and push them to GHCR using the same script you
# run locally. Manually triggered — this pulls ~70 debs and builds ~70 images.
on:
  workflow_dispatch:
    inputs:
      only:
        description: "Comma-separated Chrome majors to build (blank = all)"
        required: false
        default: ""
      push:
        description: "Push images to GHCR"
        type: boolean
        required: false
        default: true

concurrency:
  group: build-chrome-images
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push) Chrome images
        run: |
          args=()
          if [ -n "$ONLY" ]; then args+=(--only "$ONLY"); fi
          if [ "$PUSH" = "true" ]; then args+=(--push); fi
          bash scripts/build-chrome-images.sh "${args[@]}"
        env:
          ONLY: ${{ inputs.only }}
          PUSH: ${{ inputs.push }}
          REGISTRY: ghcr.io/techarohq/gubal/chrome
          # TEMPORARY: fetch the manifest and debs from the uncached origin endpoint
          # instead of the default chrome-archive.t3.tigrisfiles.io CDN. The t3 edge
          # cache pinned a truncated Chrome 140 deb (and a stale manifest.json) and
          # would not invalidate, which breaks every 26.04-era build. Remove this once
          # the Tigris cache bug is resolved. See docs/chrome-140-cache-divergence.md.
          CHROME_BUCKET_URL: https://chrome-archive.fly.storage.tigris.dev
