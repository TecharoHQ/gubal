name: ci

# Build + test the Go controller and build its Docker image on every push and PR.
# The image is only pushed to GHCR on a push to main — PRs and other branches build
# it (to prove the Dockerfile still works) but never publish.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/techarohq/gubal/chrome-bully
      # Only publish when this run is a push to main; PRs just build.
      PUBLISH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go build
        run: go build -o ./var/chrome-bully ./cmd/chrome-bully

      - name: go test
        run: go test ./...

      - uses: docker/setup-buildx-action@v3

      # Authenticate only when we intend to push, so PRs (incl. from forks) don't
      # need registry credentials.
      - name: Log in to GHCR
        if: ${{ env.PUBLISH == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main) chrome-bully image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.chrome-bully
          push: ${{ env.PUBLISH == 'true' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # foxbridge is the browser-less base image the Firefox era images COPY the foxbridge
  # binary out of. Rebuilt on every push/PR to prove the Dockerfile still works, and
  # published to GHCR only on a push to main — same policy as chrome-bully above.
  build-foxbridge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/techarohq/gubal/foxbridge
      PUBLISH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ env.PUBLISH == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main) foxbridge base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.foxbridge
          push: ${{ env.PUBLISH == 'true' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
